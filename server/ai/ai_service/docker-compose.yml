#version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: desert_pulse_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: desert_pulse
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - desert_pulse_network

  ai_service:
    build: .
    container_name: desert_pulse_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - ENVIRONMENT=development
      - GEMINI_API_KEY=AIzaSyCA0nOn63xKBN5VolwgfGf23YWrBmQlPYc
      - GEMINI_MODEL_NAME=gemini-2.5-flash
    depends_on:
      - mongodb
    volumes:
      - .:/app
    networks:
      - desert_pulse_network
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  desert_pulse_network:
    driver: bridge